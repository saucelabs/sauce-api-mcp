name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
        default: patch
      prerelease_token:
        description: 'Pre-release token (alpha, beta, rc) — only used when bump_type is prerelease'
        required: false
        default: 'rc'

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # PyPI trusted publishing + MCP Registry OIDC
      contents: write   # push version-bump commit and tag

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install python-semantic-release build twine

      - name: Bump version and push tag
        id: semrel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ inputs.bump_type }}" == "prerelease" ]; then
            semantic-release version --as-prerelease --prerelease-token "${{ inputs.prerelease_token }}" --push --no-vcs-release
          else
            semantic-release version --${{ inputs.bump_type }} --push --no-vcs-release
          fi

      - name: Create GitHub Release (stable)
        if: |
          steps.semrel.outputs.released == 'true' &&
          !contains(steps.semrel.outputs.version, 'alpha') &&
          !contains(steps.semrel.outputs.version, 'beta') &&
          !contains(steps.semrel.outputs.version, 'rc')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_TAG="v${{ steps.semrel.outputs.version }}"
          LAST_STABLE=$(git tag --sort=-version:refname | grep -v 'alpha\|beta\|rc' | grep -v "^${CURRENT_TAG}$" | head -1)
          NOTES_START_TAG_ARG=""
          if [ -n "$LAST_STABLE" ]; then
            NOTES_START_TAG_ARG="--notes-start-tag $LAST_STABLE"
          fi
          gh release create "$CURRENT_TAG" \
            --title "$CURRENT_TAG" \
            --generate-notes \
            $NOTES_START_TAG_ARG \
            --verify-tag \
            server.json

      - name: Create GitHub Release (pre-release)
        if: |
          steps.semrel.outputs.released == 'true' &&
          (contains(steps.semrel.outputs.version, 'alpha') ||
           contains(steps.semrel.outputs.version, 'beta') ||
           contains(steps.semrel.outputs.version, 'rc'))
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.semrel.outputs.version }}" \
            --title "v${{ steps.semrel.outputs.version }}" \
            --prerelease \
            --generate-notes \
            --verify-tag

      - name: Build package
        if: steps.semrel.outputs.released == 'true'
        run: python -m build

      - name: Check package
        if: steps.semrel.outputs.released == 'true'
        run: twine check dist/*

      - name: Publish to TestPyPI (pre-releases)
        if: |
          steps.semrel.outputs.released == 'true' &&
          (contains(steps.semrel.outputs.version, 'alpha') ||
           contains(steps.semrel.outputs.version, 'beta') ||
           contains(steps.semrel.outputs.version, 'rc'))
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish to PyPI (stable releases)
        if: |
          steps.semrel.outputs.released == 'true' &&
          !contains(steps.semrel.outputs.version, 'alpha') &&
          !contains(steps.semrel.outputs.version, 'beta') &&
          !contains(steps.semrel.outputs.version, 'rc')
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Install MCP Publisher
        if: |
          steps.semrel.outputs.released == 'true' &&
          !contains(steps.semrel.outputs.version, 'alpha') &&
          !contains(steps.semrel.outputs.version, 'beta') &&
          !contains(steps.semrel.outputs.version, 'rc')
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Login to MCP Registry
        if: |
          steps.semrel.outputs.released == 'true' &&
          !contains(steps.semrel.outputs.version, 'alpha') &&
          !contains(steps.semrel.outputs.version, 'beta') &&
          !contains(steps.semrel.outputs.version, 'rc')
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        if: |
          steps.semrel.outputs.released == 'true' &&
          !contains(steps.semrel.outputs.version, 'alpha') &&
          !contains(steps.semrel.outputs.version, 'beta') &&
          !contains(steps.semrel.outputs.version, 'rc')
        run: ./mcp-publisher publish